site_name: Annona Docs
site_description: Customer help and product documentation for Annona
site_url: https://goannona.github.io/annona-docs/
repo_url: https://github.com/goAnnona/annona-docs
repo_name: goAnnona/annona-docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Customer tenant:
      - User guide overview: user-guide.md
      - Home and status: home.md
      - Onboarding: onboarding.md
      - Uploads: uploads.md
  - Product workflows:
      - Agents: agents.md
      - Datasets: datasets.md
      - Traces: traces.md
  - Account and help:
      - Account and access: account/access.md
      - Help and support: help.md
      - Stable help-link targets: help-link-targets.md
exclude_docs: |
  delivery/**
  ingestion/**
  proofs/**
  getting-started/local-preview.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
plugins:
  - search
