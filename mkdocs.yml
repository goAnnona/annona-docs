site_name: Annona Docs
site_description: Customer help and product documentation for Annona
site_url: https://goannona.github.io/annona-docs/
repo_url: https://github.com/goAnnona/annona-docs
repo_name: goAnnona/annona-docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Getting started:
      - Welcome to Annona: getting-started/welcome-to-annona.md
      - Upload your data: getting-started/upload-your-data.md
  - Product guides:
      - User guide: user-guide.md
      - Agents: product/agents.md
      - Datasets: product/datasets.md
      - Traces: product/traces.md
  - Help:
      - Account and access: help/account-and-access.md
      - How help links work: help/using-help-links.md
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
plugins:
  - search
