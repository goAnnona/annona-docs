name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Pages is not enabled for this private repo plan
        run: |
          echo "GitHub Pages deployment is intentionally disabled for this private repo on the current plan."
          echo "MkDocs build validation remains active via Docs CI."
